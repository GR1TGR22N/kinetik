<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kinetik Energy — Contact</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a1628;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #0f1f38;
            border: 1px solid #1a3050;
            border-radius: 24px;
            padding: 36px 28px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }
        .photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #f5a623;
            margin-bottom: 18px;
            box-shadow: 0 0 20px rgba(245,166,35,0.3);
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }
        .logo-accent { color: #f5a623; }
        .tagline {
            font-size: 13px;
            color: #8899aa;
            margin-bottom: 24px;
        }
        .info {
            font-size: 14px;
            line-height: 1.8;
            color: #cccccc;
            margin-bottom: 28px;
        }
        .info span {
            color: #f5a623;
            font-weight: 600;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: #f5a623;
            color: #0a1628;
            font-weight: 700;
            font-size: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: background 0.2s;
        }
        .btn:active { background: #d4891a; }
        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #556677;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="photo" src="https://harlequin-lucita-50.tiiny.site/20260302_151205.jpg" alt="Your Photo">

        <div class="logo">Kinetik <span class="logo-accent">Energy</span></div>
        <p class="tagline">Solar Consultation — Power Your Future</p>

        <div class="info">
            📞 <span>(213) 801-6025</span><br>
            📧 <span>dev.chris.fleming@gmail.com</span><br>
            🏠 Serving Southern California
        </div>

        <a class="btn" href="https://gr1tgr22n.github.io/kinetik/Index.html" target="_blank">Schedule a Consultation</a>

        <p class="footer">Tap the button to get started. Clean energy starts here.</p>
    </div>
</body>
</html>
